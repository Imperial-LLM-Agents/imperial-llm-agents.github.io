# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------
name: Kim Lab
email: sangjin at illnois dot edu
description: > # this means to ignore newlines until "url:"
  A simple, whitespace theme for academics. Based on [*folio](https://github.com/bogoli/-folio) design.
footer_text: >
  Powered by <a href="http://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
  Photos from <a href="https://unsplash.com" target="_blank">Unsplash</a>.

url:  # the base hostname & protocol for your site
baseurl: # the subpath of your site, e.g. /blog/
last_updated: # leave blank if you don't want to display last updated

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------
github_username: sjkimlab # your GitHub user name
twitter_username: sjkimlab # your Twitter handle
linkedin_username: # your LinkedIn user name
scholar_userid: # your Google Scholar ID
orcid_id: # your ORCID ID
contact_note: 

google_analytics: UA-XXXXXXXXX # out your google-analytics code

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
#blog_name: al-folio
#blog_description: a simple whitespace theme for academics

# Pagination
#paginate: 4
#permalink: /blog/:year/:title/
#paginate_path: /blog/page:num/

text:
  pagination:
    newer: 'Newer'
    older: 'Older'

# Comments
disqus_shortname: al-folio # put your disqus shortname

# Optional features
show_social_icons:  false
enable_anchorjs:    false
enable_katex:       true

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  news_archive:
    defaults:
      layout: post
    output: true
    permalink: /news_archive/:path/
  projects:
    output: true
    permalink: /projects/:path/

news_limit: 3

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

# Build settings
markdown: kramdown
highlighter: pygments

# Includes & excludes
include: ['_pages']
exclude:
  - bin
  - Gemfile
  - Gemfile.lock
  - vendor
# Plug-ins
plugins:
    - jekyll-email-protect
    - jekyll-paginate
    - jekyll/scholar
    - jemoji
    - jekyll-gallery-generator

# Jekyll-Scholar
scholar:

  last_name: Kim
  first_name: Sangjin 

  style: apa
  locale: en

  sort_by: year
  order: descending

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"

# -----------------------------------------------------------------------------
# Jekyll Gallery Generator
# -----------------------------------------------------------------------------

gallery:
  dir: "gallery"   # Path to the gallery
  symlink: false            # false: copy images into _site. true: create symbolic links (saves disk space)
  title: "gallery"          # Title for gallery index page
  title_prefix: "gallery: " # Title prefix for gallery pages. Gallery title = title_prefix + gallery_name
  sort_field: "name"   # How to sort galleries on the index page.
                            # Possible values are: title, date_time, best_image, name
  galleries:
    2021_Riggs:
      best_image: 20210730.png
      name: "2021, Happy Hour @ Riggs"
    2021:
      best_image: 20210702_181451.jpg
      name: "2021, Kim Lab"
    2020:
      best_image: 20200804_175307.jpg
      name: "2020, Kim Lab"
    2019_CPLC_summer_school:
      best_image: 20190730_190316.jpg
      name: "2019, CPLC summer school"
    2019:
      best_image: 20190906.jpg
      name: "2019, Kim Lab"

# -----------------------------------------------------------------------------
# Other settings
# -----------------------------------------------------------------------------
jquery_version: "1.12.4"
katex_version: "0.9.0"
anchorjs_version: "3.2.2"
